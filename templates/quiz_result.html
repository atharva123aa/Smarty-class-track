<html>

<head>
    <title> QUIZ RESULTS</TITLE>
    <style>
        BODY {
            font-family: verdana;
            background: pink;
            padding: 20px;
        }

        .score {
            font-size: 30px;
            font-weight: bold;
            color: #9c27b1;
            margIN: 10px 0;
        }

        .right {
            color: green;
        }

        .wrong {
            color: red;
        }

        .rbox {
            background: white;
            padding: 13px;
            margin: 8px 0;
            border-radius: 5px;
            font-size: 19px;
        }

        a {
            color: #555;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <a href="/quiz">! take quiz again</a>
    <h2> RESULTS OF QUIZZZ.</H2>
    <p class="score">{{score }} / {{total}}</p>

    {% for r in results %}
    <!--QUES. RESULT-->
    <DIV CLASS="rbox">
        <p>{{ r[0]}} </P>
        <p class="{{ r[3] }}">
            your answer:{{r[1] }} -
            correct: {{ r[2] }}
        </p>
    </div>

    {% endfor %}
    <!--todo:  save result and export for studs-->
    <br>
    <a href="/">home</a>
</body>

</html>
