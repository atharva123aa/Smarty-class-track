<html>

<head>
    <title>RECORD's</title>
    <style>
        body {
            font-family: arial;
            padding: 19px;
            background: #f0f1f0;
        }

        table {
            width: 92%;
            border-collapse: collapse;
            background: white
        }

        /*todo:ADD SOME MORE DECO  */

        td,
        th {
            padding: 9px;
            border: 1px solid #ccc;
        }

        th {
            background: #333;
            color: white;
        }


        .present {
            color: green;
        }

        .absent {
            color: Red;
        }

        a {
            color: #555;
            font-size: 13px;
            display: block;
            MARGIN-BOTTOM: 11PX;
        }
    </STYLE>
</HEAD>

<body>
    <a href="/">home</a>
    <!--TODO:add filter and pdf export later -->

    {% if records %}


    <table>
        <tr>
            <th>date</th>
            <th>student</th>

            <th>status</th>
        </tr>

        {% for r in records %}
        <tr>
            <td> {{ r[0] }}</td>
            <td> {{ r[1] }}</td>
            <!--color-->
            <td class="{{ r[2]}}">{{ r[2]}}</td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
    <p> no records found</p>
    {% endif %}
    <br>
    <a href="/attendance"> MARK ATTENDANCE</A>
</body>

</html>
